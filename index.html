<main id="dashboard">
            <div class="card controls-card">
                <div class="controls-row">
                    <div class="input-group">
                        <label class="label">Assistant Mode</label>
                        <select id="mode-toggle" class="custom-select">
                            <option value="assessment">Psychological Assessment</option>
                            <option value="chat">Global Chat Assistant</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="label">Language</label>
                        <select id="language-select" class="custom-select">
                            <option value="en-IN">English</option>
                            <option value="hi-IN">Hindi (हिंदी)</option>
                            <option value="mr-IN">Marathi (मराठी)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card profile-card">
                <div class="label">My Personality Type</div>
                <div class="type-display">
                    <div id="mbti-type" class="mbti-badge">Analyzing...</div>
                    <p id="mbti-desc" class="subtitle">Start a conversation to find your type.</p>
                </div>
            </div>

            <div class="card traits-card">
                <div class="label">Husband/Wife Qualities</div>
                <div id="traits-list" class="traits-content">
                    <p class="subtitle">Complete your assessment to unlock your partner profile.</p>
                </div>
            </div>

            <div class="voice-btn-container">
                <button id="voice-btn" class="voice-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
            </div>

            <div class="card assessment-card">
                <div class="label">Live Transcript</div>
                <div id="transcript" class="subtitle" style="font-style: italic;">"Wait for voice input..."</div>
            </div>
        </main>
