<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul-Sync | AI Personal Companion</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Soul-Sync AI</h1>
            <p class="subtitle">Your personal guide to personality & life.</p>
        </header>

        <main id="dashboard">
            <div class="card profile-card">
                <div class="label">Identity Architecture</div>
                <div class="type-display">
                    <div id="mbti-type" class="mbti-badge">Analyzing...</div>
                    <p id="mbti-desc" class="subtitle">Talk to me to map your vibe.</p>
                </div>
            </div>

            <div id="media-card" class="card hidden">
                <div class="label" id="media-label">Recommended for you</div>
                <div id="media-content" class="media-grid">
                    </div>
            </div>

            <div class="voice-btn-container">
                <button id="voice-btn" class="voice-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
            </div>

            <div class="card assessment-card">
                <div id="transcript" class="subtitle" style="font-style: normal; line-height: 1.5;">"आणि काय म्हणता? बोला, मी ऐकतोय..."</div>
            </div>
        </main>

        <div id="settings-modal" class="hidden">
            <div class="card">
                <h2 style="margin-bottom: 20px; text-align: center;">System Setup</h2>
                <form id="settings-form">
                    <input type="password" id="gemini-key" placeholder="Gemini Key" style="margin-bottom:10px;">
                    <input type="password" id="sarvam-key" placeholder="Sarvam Key">
                    <button type="submit" class="btn-primary" style="margin-top:20px;">Initialize</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
