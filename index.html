<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul-Sync | AI Partner Compatibility</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Soul-Sync AI</h1>
            <div class="header-controls">
                <select id="mode-toggle" class="mini-select">
                    <option value="assessment">MBTI Discovery</option>
                    <option value="chat">Free Chat</option>
                </select>
                <select id="language-select" class="mini-select">
                    <option value="en-IN">English</option>
                    <option value="hi-IN">Hindi</option>
                    <option value="mr-IN">Marathi</option>
                </select>
            </div>
        </header>

        <main id="dashboard">
            <div class="card profile-card">
                <div class="label">My Personality Type</div>
                <div class="type-display">
                    <div id="mbti-type" class="mbti-badge">Analyzing...</div>
                    <p id="mbti-desc" class="subtitle">Start a conversation to find your type.</p>
                </div>
            </div>

            <div class="card traits-card">
                <div class="label">Partner Qualities</div>
                <div id="traits-list" class="traits-content">
                    <p class="subtitle">Talk to me to unlock your partner profile.</p>
                </div>
            </div>

            <div class="voice-btn-container">
                <button id="voice-btn" class="voice-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
            </div>

            <div class="card assessment-card">
                <div class="label">Live Transcript</div>
                <div id="transcript" class="subtitle">"Tap the mic to start talking..."</div>
            </div>
        </main>

        <div id="settings-modal" class="hidden">
            <div class="card modal-content">
                <h2>AI Configuration</h2>
                <form id="settings-form">
                    <input type="password" id="gemini-key" placeholder="Gemini API Key">
                    <input type="password" id="sarvam-key" placeholder="Sarvam API Key">
                    <button type="submit" class="btn-primary">Save & Start</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
