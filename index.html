<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul-Sync | Personality Architecture</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Soul-Sync AI</h1>
            <div class="header-controls" style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                <select id="language-select" style="background: var(--card-bg); color: var(--text-dim); border: 1px solid var(--glass-border); border-radius: 8px; padding: 5px 10px; font-size: 0.8rem;">
                    <option value="en-IN">English</option>
                    <option value="hi-IN">Hindi</option>
                    <option value="mr-IN">Marathi</option>
                </select>
            </div>
        </header>

        <main id="dashboard">
            <div class="card profile-card">
                <div class="label">Core Personality Type</div>
                <div class="type-display">
                    <div id="mbti-type" class="mbti-badge">Analyzing...</div>
                    <p id="mbti-desc" class="subtitle">Engage in conversation to map your cognitive functions.</p>
                </div>
            </div>

            <div class="card traits-card">
                <div class="label">Behavioral Traits & Dynamics</div>
                <div id="traits-list" class="traits-content">
                    <p class="subtitle" style="font-style: italic;">Awaiting behavioral data from conversation...</p>
                </div>
            </div>

            <div class="voice-btn-container">
                <button id="voice-btn" class="voice-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </button>
            </div>

            <div class="card assessment-card">
                <div class="label">Live Insights</div>
                <div id="transcript" class="subtitle">"Tap the mic to begin the analysis..."</div>
            </div>
        </main>

        <div id="settings-modal" class="hidden">
            <div class="card" style="width: 90%; max-width: 400px;">
                <h2 style="margin-bottom: 20px; text-align: center;">System Access</h2>
                <form id="settings-form">
                    <div class="input-group">
                        <label>Gemini API Key</label>
                        <input type="password" id="gemini-key" placeholder="Enter key...">
                    </div>
                    <div class="input-group">
                        <label>Sarvam Subscription Key</label>
                        <input type="password" id="sarvam-key" placeholder="Enter key...">
                    </div>
                    <button type="submit" class="btn-primary">Initialize System</button>
                </form>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
